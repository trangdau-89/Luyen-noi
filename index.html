<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bé Học Nói - Luyện Tiếng Anh Cùng AI</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load FontAwesome (Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Load React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Load Babel để dịch JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .hide-scroll::-webkit-scrollbar { display: none; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent; /* Bỏ viền xanh khi chạm trên điện thoại */
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // =========================================================================
        // BƯỚC QUAN TRỌNG: DÁN API KEY CỦA BẠN VÀO GIỮA 2 DẤU NGOẶC KÉP BÊN DƯỚI
        const apiKey = "AIzaSyClRPF_RvpjpE4zonRr3aIhWeCePas940I"; 
        // =========================================================================

        const SCENARIOS = [
          { 
            id: 'self_intro', 
            title: 'Giới thiệu', 
            character: 'Robot Toby',
            imageUrl: 'https://images.unsplash.com/photo-1589254065878-42c9da997008?w=600&h=400&fit=crop',
            greeting: { en: "Hello! I am Toby. What is your name?", vi: "Xin chào! Mình là Toby. Bạn tên là gì?" },
            initialHints: [
              { en: "My name is Bi.", vi: "Mình tên là Bi." },
              { en: "I am Tom.", vi: "Mình là Tom." },
              { en: "Hello Toby!", vi: "Chào Toby!" }
            ],
            icon: 'fas fa-robot', 
            color: 'bg-pink-100', 
            btnColor: 'bg-pink-500',
            prompt: 'You are a friendly Robot named Toby talking to an 8-year-old child. Keep sentences very short (under 7 words). Use simple A1 vocabulary. Follow this 10-step roadmap: 1(Ask name - done), 2(Ask age), 3(Ask how they feel today), 4(Ask favorite color), 5(Ask favorite animal), 6(Ask favorite food), 7(Ask favorite toy), 8(Ask if they like sports), 9(Ask if they have brothers or sisters), 10(Say you are happy to meet them and say goodbye). RULE: Read the conversation history. Praise the child\'s last answer first, then ask the NEXT question on the roadmap. ONLY ask one question at a time.'
          },
          { 
            id: 'family', 
            title: 'Gia đình', 
            character: 'Ông bà / Ba mẹ',
            imageUrl: 'https://images.unsplash.com/photo-1511895426328-dc8714191300?w=600&h=400&fit=crop',
            greeting: { en: "Hello! Did you have fun at school today?", vi: "Chào con! Hôm nay ở trường có vui không?" },
            initialHints: [
              { en: "Yes, it was fun!", vi: "Dạ có, vui lắm ạ!" },
              { en: "I played with friends.", vi: "Con đã chơi với bạn." },
              { en: "I am hungry.", vi: "Con đói bụng rồi." }
            ],
            icon: 'fas fa-home', 
            color: 'bg-orange-100', 
            btnColor: 'bg-orange-500',
            prompt: 'You are a loving parent talking to your 8-year-old child. Keep sentences very short (under 7 words). A1 vocabulary. Follow this 10-step roadmap: 1(Fun at school?), 2(What did you play?), 3(Who did you play with?), 4(Are you hungry?), 5(Do you want chicken or fish for dinner?), 6(Did you wash your hands?), 7(Do you have homework?), 8(Do you want to read a book?), 9(Did you brush your teeth?), 10(Say goodnight and I love you). RULE: Praise the child\'s answer first, then ask the NEXT question on the roadmap. ONLY ask one question at a time.'
          },
          { 
            id: 'school', 
            title: 'Trường học', 
            character: 'Cô giáo Anna',
            imageUrl: 'https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=600&h=400&fit=crop',
            greeting: { en: "Good morning! How are you today?", vi: "Chào buổi sáng! Hôm nay em thế nào?" },
            initialHints: [
              { en: "I am fine, thank you.", vi: "Em khỏe, em cảm ơn cô." },
              { en: "I am happy today.", vi: "Hôm nay em rất vui." },
              { en: "Good morning!", vi: "Chào buổi sáng ạ!" }
            ],
            icon: 'fas fa-book-open', 
            color: 'bg-blue-100', 
            btnColor: 'bg-blue-500',
            prompt: 'You are an English teacher named Anna talking to an 8-year-old. Keep sentences very short (under 7 words). A1 vocabulary. Follow this 10-step roadmap: 1(How are you?), 2(Did you eat breakfast?), 3(Are you ready to learn?), 4(Where is your book?), 5(What color is your book?), 6(Can you count to 3?), 7(Do you like drawing?), 8(Who is your best friend?), 9(What is your favorite game?), 10(Say see you tomorrow). RULE: Praise the child\'s answer first, then ask the NEXT question on the roadmap. ONLY ask one question at a time.'
          },
          { 
            id: 'supermarket', 
            title: 'Siêu thị', 
            character: 'Bác bán hàng',
            imageUrl: 'https://images.unsplash.com/photo-1578916171728-46686eac8d58?w=600&h=400&fit=crop',
            greeting: { en: "Hello little friend! Do you want to buy apples?", vi: "Chào cháu! Cháu có muốn mua táo không?" },
            initialHints: [
              { en: "Yes, one apple please.", vi: "Dạ có, cho cháu 1 quả." },
              { en: "No, thank you.", vi: "Dạ thôi, cháu cảm ơn." },
              { en: "How much is it?", vi: "Quả này bao nhiêu tiền ạ?" }
            ],
            icon: 'fas fa-shopping-cart', 
            color: 'bg-green-100', 
            btnColor: 'bg-green-500',
            prompt: 'You are a cashier at a supermarket talking to an 8-year-old. Keep sentences short. Follow this 10-step roadmap: 1(Buy apples?), 2(Red or green apples?), 3(How many apples?), 4(Do you want milk?), 5(Strawberry or chocolate milk?), 6(Do you want candy?), 7(Do you need a bag?), 8(Where is your mom or dad?), 9(The total is 5 dollars.), 10(Say thank you and goodbye). RULE: React to the child\'s answer first, then ask the NEXT question. ONLY ask one question at a time.'
          },
          { 
            id: 'tourist', 
            title: 'Du lịch', 
            character: 'Khách nước ngoài',
            imageUrl: 'https://images.unsplash.com/photo-1501555088652-021faa106b9b?w=600&h=400&fit=crop',
            greeting: { en: "Hi! Can you help me? Where is the park?", vi: "Chào cháu! Cháu giúp cô được không? Công viên ở đâu nhỉ?" },
            initialHints: [
              { en: "It is over there.", vi: "Nó ở đằng kia ạ." },
              { en: "I don't know.", vi: "Cháu không biết ạ." },
              { en: "My name is Tom.", vi: "Tên cháu là Tom." }
            ],
            icon: 'fas fa-map-marked-alt', 
            color: 'bg-purple-100', 
            btnColor: 'bg-purple-500',
            prompt: 'You are a tourist talking to an 8-year-old. Keep sentences short. Follow this 10-step roadmap: 1(Where is the park?), 2(Is the park big?), 3(What is your name?), 4(How old are you?), 5(Do you like playing there?), 6(Do you like slides or swings?), 7(Where are you from?), 8(Do you like ice cream?), 9(Where can I buy ice cream?), 10(Say thank you and bye). RULE: React to the child\'s answer first, then ask the NEXT question on the roadmap. ONLY ask one question at a time.'
          }
        ];

        function App() {
          const [currentScreen, setCurrentScreen] = useState('home'); 
          const [activeScenario, setActiveScenario] = useState(null);
          const [chatHistory, setChatHistory] = useState([]);
          const [suggestedReplies, setSuggestedReplies] = useState([]); 
          const [showHints, setShowHints] = useState(false); 
          const [isRecording, setIsRecording] = useState(false);
          const [interimTranscript, setInterimTranscript] = useState(""); 
          const [isAiThinking, setIsAiThinking] = useState(false);
          const [stars, setStars] = useState(0);
          const [errorMsg, setErrorMsg] = useState("");

          const recognitionRef = useRef(null);
          const chatContainerRef = useRef(null);
          const handleUserSpeechRef = useRef(null);
          const isProcessingRef = useRef(false);

          useEffect(() => {
            handleUserSpeechRef.current = handleUserSpeech;
          });

          // Khởi tạo công cụ nhận diện giọng nói
          useEffect(() => {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
              const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
              recognitionRef.current = new SpeechRecognition();
              
              // continuous = false để tự ngắt khi bé ngưng nói (phù hợp điện thoại)
              recognitionRef.current.continuous = false; 
              recognitionRef.current.interimResults = true;
              recognitionRef.current.lang = 'en-US';

              recognitionRef.current.onresult = (event) => {
                let finalTranscript = '';
                let currentInterim = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                  if (event.results[i].isFinal) {
                    finalTranscript += event.results[i][0].transcript;
                  } else {
                    currentInterim += event.results[i][0].transcript;
                  }
                }

                setInterimTranscript(currentInterim);

                if (finalTranscript !== '') {
                  setInterimTranscript(""); 
                  if (handleUserSpeechRef.current) {
                    handleUserSpeechRef.current(finalTranscript);
                  }
                }
              };

              recognitionRef.current.onerror = (event) => {
                setIsRecording(false);
                setInterimTranscript(""); 
                if (event.error === 'not-allowed') {
                  setErrorMsg("Hãy cho phép ứng dụng sử dụng Micro nhé!");
                } else if (event.error === 'no-speech') {
                  // Chỉ nhắc nhở nhẹ nhàng
                } else {
                  setErrorMsg("Lỗi nghe. Bé bấm nút và nói lại nhé.");
                }
                setTimeout(() => setErrorMsg(""), 3000);
              };

              recognitionRef.current.onend = () => {
                setIsRecording(false);
                setInterimTranscript(""); 
              };
            } else {
              setErrorMsg("Trình duyệt không hỗ trợ nhận diện giọng nói. Dùng Chrome/Safari nhé.");
            }
          }, []);

          // Cuộn màn hình chat
          useEffect(() => {
            if (chatContainerRef.current) {
              chatContainerRef.current.scrollTop = chatContainerRef.current.scrollHeight;
            }
          }, [chatHistory, interimTranscript]); 

          const startScenario = (scenario) => {
            setActiveScenario(scenario);
            setCurrentScreen('chat');
            setShowHints(false); 
            const initialMessage = { role: 'ai', text: scenario.greeting.en, translation: scenario.greeting.vi };
            setChatHistory([initialMessage]);
            setSuggestedReplies(scenario.initialHints); 
            speakText(scenario.greeting.en);
          };

          const goHome = () => {
            window.speechSynthesis.cancel(); 
            if (isRecording && recognitionRef.current) {
              try { recognitionRef.current.stop(); } catch(e) {}
              setIsRecording(false);
            }
            setCurrentScreen('home');
            setActiveScenario(null);
            setChatHistory([]);
            setSuggestedReplies([]); 
            setShowHints(false);
          };

          const toggleRecording = () => {
            if (!recognitionRef.current || isAiThinking || isProcessingRef.current) return;

            if (isRecording) {
              setIsRecording(false);
              try { recognitionRef.current.stop(); } catch (e) {}
            } else {
              setIsRecording(true);
              try {
                setErrorMsg("");
                recognitionRef.current.start();
              } catch (e) {
                if (e.name !== 'InvalidStateError') setIsRecording(false);
              }
            }
          };

          const speakText = (text) => {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel(); 

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            
            const voices = window.speechSynthesis.getVoices();
            const preferredVoices = voices.filter(v => v.lang.includes('en-US') || v.lang.includes('en-GB'));
            
            const bestVoice = preferredVoices.find(v => v.name.includes('Google US English')) ||
                              preferredVoices.find(v => v.name.includes('Samantha')) ||
                              preferredVoices.find(v => v.name.includes('Zira')) ||
                              preferredVoices[0];

            if (bestVoice) utterance.voice = bestVoice;
            utterance.rate = 0.85; 
            utterance.pitch = 1.2; 
            window.speechSynthesis.speak(utterance);
          };

          // --- LOGIC XỬ LÝ AI ---
          const handleUserSpeech = async (transcript) => {
            if (!activeScenario) return; 

            if (isProcessingRef.current) return;
            isProcessingRef.current = true; 
            setIsAiThinking(true);

            if (recognitionRef.current && isRecording) {
                try { recognitionRef.current.stop(); } catch (e) {}
                setIsRecording(false);
            }

            const newUserMsg = { role: 'user', text: transcript };
            const updatedHistory = [...chatHistory, newUserMsg];
            setChatHistory(updatedHistory);
            setShowHints(false); 
            setStars(prev => prev + 1);

            try {
              // Bắt lỗi rỗng API Key ngay từ đầu
              if (!apiKey || apiKey === "DÁN_API_KEY_CỦA_BẠN_VÀO_ĐÂY" || apiKey.trim() === "") {
                throw new Error("MISSING_API_KEY");
              }

              const historyText = updatedHistory.map(msg => 
                `${msg.role === 'ai' ? 'Character' : 'Child'}: ${msg.text}`
              ).join('\n');

              // NÂNG CẤP PROMPT: Ép AI "dễ dãi" tuyệt đối, khen ngợi mọi nỗ lực của bé
              const systemPrompt = `
                ${activeScenario.prompt}
                
                Current Conversation:
                ${historyText}
                
                Child just said: "${transcript}"
                
                CRITICAL INSTRUCTION FOR AI:
                You are talking to an 8-year-old child from Vietnam. YOU MUST BE EXTREMELY FORGIVING.
                - If the child says ANY English word, a Vietnamese name, a simple "yes/no", or even a mispronounced word, YOU MUST ACCEPT IT. Set "is_valid_answer": true.
                - Only set "is_valid_answer": false if the input is completely empty or literal keyboard smash (like "asdasd").
                - When valid: Say "Good job!" or "Awesome!", then ASK THE NEXT QUESTION on the 10-step roadmap.
                - Keep your English reply UNDER 10 WORDS. Simple A1 vocabulary.
              `;

              // Thêm SafetySettings để tránh Google tự động chặn câu trả lời làm lỗi App
              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: systemPrompt }] }],
                  safetySettings: [
                    { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                    { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                    { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                    { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                  ],
                  generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                      type: "OBJECT",
                      properties: {
                        is_valid_answer: { type: "BOOLEAN" },
                        reply_en: { type: "STRING" },
                        reply_vi: { type: "STRING" },
                        hints: {
                          type: "ARRAY",
                          items: {
                            type: "OBJECT",
                            properties: {
                              en: { type: "STRING" },
                              vi: { type: "STRING" }
                            }
                          }
                        }
                      },
                      required: ["is_valid_answer", "reply_en", "reply_vi", "hints"]
                    }
                  }
                })
              });

              const data = await response.json();

              if (data.error) {
                 throw new Error(data.error.message);
              }

              if (data.candidates && data.candidates.length > 0) {
                let rawText = data.candidates[0].content.parts[0].text.trim();
                let parsedData;
                
                try {
                  const jsonMatch = rawText.match(/\{[\s\S]*\}/);
                  if (jsonMatch) {
                    parsedData = JSON.parse(jsonMatch[0]);
                  } else {
                    throw new Error("Không tìm thấy dữ liệu JSON");
                  }
                } catch (e) {
                  // Fallback an toàn nếu AI trả về lỗi định dạng
                  parsedData = {
                    is_valid_answer: true,
                    reply_en: "You are doing great! Let's continue.",
                    reply_vi: "Con làm rất tốt! Mình tiếp tục nhé.",
                    hints: [{ en: "Yes", vi: "Vâng" }, { en: "Okay", vi: "Đồng ý" }]
                  };
                }

                setChatHistory(prev => [...prev, { role: 'ai', text: parsedData.reply_en, translation: parsedData.reply_vi }]);
                if (parsedData.hints && parsedData.hints.length > 0) {
                   setSuggestedReplies(parsedData.hints);
                }

                if (parsedData.is_valid_answer === false) {
                   setShowHints(true);
                }

                speakText(parsedData.reply_en);
              } else {
                 throw new Error("Invalid API response");
              }

            } catch (error) {
              console.error("AI Error:", error);
              
              // XỬ LÝ LỖI THÔNG MINH ĐỂ BÁO CHO GIÁO VIÊN BIẾT NẾU SAI API KEY
              let errorReplyEn = "Oops, my brain is taking a break. Try again!";
              let errorReplyVi = "Trí nhớ của AI vừa bị vấp một chút. Bé nói lại giúp nhé!";
              
              if (error.message === "MISSING_API_KEY") {
                  errorReplyEn = "Please add API Key!";
                  errorReplyVi = "(LỖI DÀNH CHO GIÁO VIÊN: Thầy/Cô chưa dán API Key vào dòng số 29 trong file mã nguồn. Hãy kiểm tra lại nhé!)";
                  setErrorMsg("Thiếu API Key!");
              } else if (error.message.includes("API key not valid") || error.message.includes("API_KEY_INVALID")) {
                  errorReplyEn = "API Key is wrong!";
                  errorReplyVi = "(LỖI DÀNH CHO GIÁO VIÊN: API Key nhập vào bị sai hoặc không hợp lệ. Hãy tạo khóa mới trên Google AI Studio nhé!)";
                  setErrorMsg("API Key sai!");
              }

              setChatHistory(prev => [...prev, { role: 'ai', text: errorReplyEn, translation: errorReplyVi }]);
              setSuggestedReplies([
                { en: "Hello", vi: "Xin chào" },
                { en: "Let's try again", vi: "Cùng thử lại nhé" }
              ]);
              setShowHints(true); 
              speakText(errorReplyEn);
            } finally {
              setIsAiThinking(false);
              isProcessingRef.current = false; 
            }
          };

          useEffect(() => {
            if (window.speechSynthesis) {
                window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
            }
          }, []);

          // --- GIAO DIỆN CHÍNH ---
          if (currentScreen === 'home') {
            return (
              <div className="min-h-screen bg-yellow-50 text-gray-800 font-sans p-4 md:p-8 flex flex-col items-center">
                <div className="max-w-md w-full">
                  <div className="flex justify-between items-center mb-8 bg-white p-4 rounded-3xl shadow-sm border-2 border-yellow-200">
                    <div className="flex items-center gap-3">
                      <div className="bg-yellow-400 p-2 rounded-full text-white text-2xl w-10 h-10 flex items-center justify-center">
                        <i className="fas fa-smile"></i>
                      </div>
                      <div>
                        <h1 className="text-xl font-bold text-yellow-600">Bé Học Nói</h1>
                        <p className="text-xs text-gray-500 font-medium">Luyện tiếng Anh vui vẻ!</p>
                      </div>
                    </div>
                    <div className="flex items-center gap-1 bg-orange-100 px-3 py-1.5 rounded-full border border-orange-200">
                      <i className="fas fa-star text-orange-500"></i>
                      <span className="font-bold text-orange-600 text-lg">{stars}</span>
                    </div>
                  </div>

                  <h2 className="text-2xl font-black mb-6 text-center text-gray-700">Hôm nay bé muốn nói chuyện với ai?</h2>

                  <div className="grid grid-cols-2 gap-4">
                    {SCENARIOS.map((scenario) => (
                      <button
                        key={scenario.id}
                        onClick={() => startScenario(scenario)}
                        className={`${scenario.color} p-6 rounded-3xl flex flex-col items-center justify-center gap-4 transition-transform active:scale-95 shadow-sm border-b-4 border-black/10`}
                      >
                        <div className="p-4 rounded-full bg-white/60 text-gray-800 text-3xl w-16 h-16 flex items-center justify-center">
                          <i className={scenario.icon}></i>
                        </div>
                        <div className="text-center">
                          <h3 className="font-bold text-lg">{scenario.title}</h3>
                          <p className="text-xs font-medium opacity-70 mt-1">{scenario.character}</p>
                        </div>
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            );
          }

          // --- GIAO DIỆN CHAT ---
          return (
            <div className="min-h-screen bg-gray-50 flex flex-col items-center font-sans">
              <div className="max-w-md w-full h-screen flex flex-col bg-white shadow-xl relative overflow-hidden">
                
                <div className={`absolute top-0 left-0 right-0 h-48 ${activeScenario.color} rounded-b-[3rem] opacity-50`}></div>

                <div className="relative z-10 flex items-center justify-between p-4 pt-6">
                  <button onClick={goHome} className="p-3 bg-white rounded-full shadow-sm text-gray-600 active:scale-90 w-10 h-10 flex items-center justify-center">
                    <i className="fas fa-arrow-left"></i>
                  </button>
                  
                  <div className="flex flex-col items-center">
                    <div className={`w-12 h-12 flex items-center justify-center rounded-full bg-white shadow-sm mb-1 text-2xl ${activeScenario.btnColor.replace('bg-', 'text-')}`}>
                      <i className={activeScenario.icon}></i>
                    </div>
                    <span className="font-bold text-gray-800">{activeScenario.title}</span>
                  </div>

                  <div className="flex items-center gap-1 bg-white px-3 py-2 rounded-full shadow-sm">
                    <i className="fas fa-star text-orange-500"></i>
                    <span className="font-bold">{stars}</span>
                  </div>
                </div>

                {errorMsg && (
                  <div className="absolute top-24 left-4 right-4 bg-red-100 text-red-600 p-3 rounded-xl flex items-center justify-center gap-2 z-20 shadow-md text-sm font-medium animate-bounce">
                    <i className="fas fa-exclamation-circle"></i> {errorMsg}
                  </div>
                )}

                <div ref={chatContainerRef} className="flex-1 overflow-y-auto p-4 flex flex-col gap-4 z-10 pb-8">
                  <div className="w-full rounded-2xl overflow-hidden shadow-sm border-2 border-white mb-2 relative shrink-0">
                    <img src={activeScenario.imageUrl} alt={activeScenario.title} className="w-full h-40 object-cover"/>
                    <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/60 to-transparent p-3">
                      <p className="text-white font-bold flex items-center gap-2">
                        <i className={activeScenario.icon}></i> Bối cảnh: {activeScenario.title}
                      </p>
                    </div>
                  </div>

                  {chatHistory.map((msg, idx) => (
                    <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                      <div className={`max-w-[80%] rounded-3xl p-4 shadow-sm relative group flex flex-col ${msg.role === 'user' ? 'bg-blue-500 text-white rounded-tr-sm' : 'bg-gray-100 text-gray-800 rounded-tl-sm border border-gray-200'}`}>
                        <span className="text-lg font-medium">{msg.text}</span>
                        {msg.translation && (
                          <span className={`text-sm mt-1 pt-1 border-t ${msg.role === 'user' ? 'border-blue-400 text-blue-100' : 'border-gray-300 text-gray-500'} italic font-normal`}>
                            {msg.translation}
                          </span>
                        )}
                        {msg.role === 'ai' && (
                          <button onClick={() => speakText(msg.text)} className="absolute -right-12 top-1/2 -translate-y-1/2 p-2 text-gray-400 hover:text-blue-500 opacity-0 group-hover:opacity-100 transition-opacity">
                            <i className="fas fa-volume-up text-xl"></i>
                          </button>
                        )}
                      </div>
                    </div>
                  ))}

                  {interimTranscript && (
                    <div className="flex justify-end animate-in fade-in duration-200">
                       <div className="max-w-[80%] rounded-3xl rounded-tr-sm p-4 shadow-sm bg-blue-400 text-white flex items-center gap-3 opacity-80 border-2 border-blue-300 border-dashed">
                         <i className="fas fa-microphone animate-pulse"></i>
                         <span className="text-lg font-medium">{interimTranscript}</span>
                         <span className="animate-bounce">...</span>
                       </div>
                    </div>
                  )}
                  
                  {isAiThinking && (
                    <div className="flex justify-start">
                      <div className="bg-gray-100 rounded-3xl rounded-tl-sm p-4 text-gray-500 flex items-center gap-2">
                        <i className="fas fa-spinner fa-spin text-xl"></i>
                        <span className="text-sm font-medium">Đang nghĩ...</span>
                      </div>
                    </div>
                  )}
                </div>

                <div className="shrink-0 flex flex-col bg-white/95 backdrop-blur-sm border-t border-gray-100 pt-3 pb-6 z-20 shadow-[0_-10px_20px_-10px_rgba(0,0,0,0.05)]">
                  {!isAiThinking && suggestedReplies.length > 0 && (
                    <div className="w-full flex flex-col mb-2 items-center">
                      {!showHints ? (
                        <button onClick={() => setShowHints(true)} className="flex items-center gap-2 bg-blue-50 text-blue-600 hover:bg-blue-100 px-4 py-2 rounded-full font-bold text-sm shadow-sm border border-blue-200">
                          <i className="fas fa-lightbulb"></i> Bé cần gợi ý? (Nhấn vào đây)
                        </button>
                      ) : (
                        <div className="w-full flex flex-col animate-in fade-in slide-in-from-bottom-2 duration-300">
                          <div className="flex justify-between items-center px-4 mb-2">
                            <p className="text-[11px] uppercase font-bold text-gray-400 tracking-wider flex items-center gap-1">
                              <i className="fas fa-lightbulb"></i> Gợi ý (Cuộn ngang để xem thêm):
                            </p>
                            <button onClick={() => setShowHints(false)} className="text-gray-400 bg-gray-100 rounded-full w-6 h-6 flex items-center justify-center">
                              <i className="fas fa-times"></i>
                            </button>
                          </div>
                          
                          <div className="hide-scroll flex overflow-x-auto gap-3 px-4 pb-2 w-full snap-x" style={{ scrollbarWidth: 'none', msOverflowStyle: 'none' }}>
                            {suggestedReplies.map((hint, idx) => (
                              <button key={idx} onClick={() => speakText(hint.en)} className="snap-center shrink-0 bg-white border-2 border-blue-100 px-4 py-2 rounded-2xl shadow-sm active:scale-95 text-left flex flex-col items-start w-[180px]">
                                <span className="text-[15px] font-bold text-blue-700 leading-tight mb-1">{hint.en}</span>
                                <span className="text-[13px] font-medium text-gray-500 italic line-clamp-2">{hint.vi}</span>
                              </button>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>
                  )}

                  <div className="relative flex flex-col items-center justify-center w-full mt-1">
                    <div className="relative flex items-center justify-center h-20">
                      {isRecording && <div className="absolute w-28 h-28 bg-red-400 rounded-full animate-ping opacity-40"></div>}
                      <button onClick={toggleRecording} disabled={isAiThinking || isProcessingRef.current} className={`relative z-10 w-20 h-20 rounded-full flex items-center justify-center shadow-lg transition-all ${isRecording ? 'bg-red-500 scale-110' : `${activeScenario.btnColor} hover:scale-105`} ${(isAiThinking || isProcessingRef.current) ? 'opacity-50 grayscale' : ''}`}>
                        {isRecording ? <i className="fas fa-square text-white text-3xl"></i> : <i className="fas fa-microphone text-white text-4xl"></i>}
                      </button>
                    </div>
                    <p className="text-xs text-gray-400 font-medium mt-3 h-4">
                       {isRecording ? "Đang nghe bé nói..." : (isAiThinking ? "Đợi một chút nhé..." : "Bấm vào Micro để nói")}
                    </p>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
